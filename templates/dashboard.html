<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="/static/css/dashboard.css">

</head>

<body>

    

    <div class="dashboard-container">

<div class="top-bar">

    <h1 id="welcome">Welcome 👋</h1>

    <a href="/prediction" class="btn prediction-btn">
        ← Go to Predict
    </a>

</div>

        <div class="cards">

            <div class="card">

                <h2>Total Predictions</h2>

                <p id="total">0</p>

            </div>

            <div class="card">

                <h2>High Risk</h2>

                <p id="high">0</p>

            </div>

            <div class="card">

                <h2>Low Risk</h2>

                <p id="low">0</p>

            </div>

            <div class="card">

                <h2>Latest Prediction</h2>

                <p id="latest">-</p>

            </div>

        </div>

        <div class="quick-links">

            <h2>Quick Actions</h2>

            <button onclick="window.location.href='/'">

                New Prediction

            </button>

            <button onclick="window.location.href='/history-page'">

                Prediction History

            </button>

            <button onclick="window.location.href='/profile-page'">

                My Profile

            </button>

        </div>

    </div>

    <script src="/static/js/dashboard.js"></script>

</body>

</html>
